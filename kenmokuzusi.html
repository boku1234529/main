<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>ケンモ崩し</title>
<style>
  :root{
    --ink:#1c1b29;
    --paper:#f4efe4;
    --accent:#e8734a;
    --accent2:#3c6e8f;
    --gold:#d9b25a;
  }
  *{box-sizing:border-box;}
  html{
    -webkit-text-size-adjust:100%;
  }
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background:radial-gradient(circle at 50% -10%, #2c2a3d 0%, #15141f 60%, #0c0b12 100%);
    font-family:"Hiragino Sans","Yu Gothic",system-ui,sans-serif;
    color:var(--paper);
    padding:24px 12px;
    overscroll-behavior:none;
    -webkit-tap-highlight-color:transparent;
  }
  h1{
    font-size:20px;
    letter-spacing:.12em;
    margin:0 0 4px;
    font-weight:700;
    text-align:center;
  }
  .sub{
    font-size:12px;
    opacity:.6;
    margin:0 0 14px;
    letter-spacing:.05em;
    text-align:center;
  }
  .stage{
    position:relative;
    width:min(480px, 92vw);
    border-radius:14px;
    padding:10px;
    background:linear-gradient(160deg,#26243a,#16151f);
    box-shadow:0 20px 50px rgba(0,0,0,.55), inset 0 0 0 1px rgba(255,255,255,.06);
  }
  #hud{
    display:flex;
    justify-content:space-between;
    font-size:13px;
    padding:2px 8px 8px;
    letter-spacing:.05em;
  }
  #hud span{opacity:.85;}
  #hud b{color:var(--gold);}
  canvas{
    display:block;
    width:100%;
    height:auto;
    border-radius:8px;
    background:#000;
    touch-action:none;
    cursor:pointer;
    -webkit-touch-callout:none;
    -webkit-user-select:none;
    user-select:none;
  }
  .hint{
    width:min(480px, 92vw);
    text-align:center;
    font-size:12px;
    opacity:.55;
    margin:10px auto 0;
    letter-spacing:.03em;
  }
  #overlay{
    position:absolute;
    inset:10px;
    top:42px;
    border-radius:8px;
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    background:rgba(10,9,15,.72);
    backdrop-filter:blur(2px);
    text-align:center;
    gap:10px;
  }
  #overlay h2{
    margin:0;
    font-size:22px;
    letter-spacing:.08em;
  }
  #overlay p{
    margin:0;
    font-size:13px;
    opacity:.75;
    max-width:260px;
    line-height:1.6;
  }
  #overlay button{
    margin-top:6px;
    padding:9px 22px;
    border:none;
    border-radius:999px;
    background:var(--accent);
    color:#1c1b29;
    font-weight:700;
    font-size:13px;
    letter-spacing:.05em;
    cursor:pointer;
  }
  #overlay button:hover{background:var(--gold);}
  #overlay .secondaryBtn{
    margin-top:2px;
    background:transparent;
    color:var(--paper);
    box-shadow:inset 0 0 0 1px rgba(244,239,228,0.5);
  }
  #overlay .secondaryBtn:hover{background:rgba(244,239,228,0.12);}
  #galleryOverlay{
    position:absolute;
    inset:10px;
    top:42px;
    border-radius:8px;
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:flex-end;
    gap:8px;
    padding-bottom:18px;
  }
  #galleryOverlay button{
    padding:9px 22px;
    border:none;
    border-radius:999px;
    background:rgba(12,11,18,0.55);
    color:var(--paper);
    font-weight:700;
    font-size:13px;
    letter-spacing:.05em;
    cursor:pointer;
    box-shadow:inset 0 0 0 1px rgba(244,239,228,0.5);
    backdrop-filter:blur(2px);
  }
  #galleryOverlay button:hover{background:rgba(12,11,18,0.8);}

  /* スマホ(狭い画面)向けの微調整 */
  @media (max-width: 380px){
    body{ padding:16px 8px; }
    h1{ font-size:17px; }
    .sub{ font-size:11px; }
    #hud{ font-size:11px; padding:2px 4px 6px; letter-spacing:.02em; }
    .hint{ font-size:10.5px; padding:0 4px; }
    #overlay h2{ font-size:19px; }
    #overlay p{ font-size:12px; max-width:220px; }
    #overlay button, #galleryOverlay button{ font-size:12px; padding:8px 18px; }
  }
  @media (max-height: 700px){
    body{ padding-top:10px; padding-bottom:10px; }
    h1{ margin-bottom:2px; }
    .sub{ margin-bottom:8px; }
  }
</style>
</head>
<body>

<h1>ケンモ崩し</h1>
<p class="sub">いいだろ！</p>

<div class="stage">
  <div id="hud">
    <span>SCORE <b id="score">0</b></span>
    <span>SPEED <b id="speed">1</b>/5</span>
    <span>LIVES <b id="lives">3</b></span>
  </div>
  <canvas id="game" width="480" height="683"></canvas>
  <div id="overlay">
    <h2 id="overlayTitle"></h2>
    <p id="overlayText"></p>
    <button id="overlayBtn">もう一度</button>
    <button id="viewArtBtn" class="secondaryBtn">絵を見る</button>
  </div>
  <div id="galleryOverlay">
    <button id="saveArtBtn">絵を保存</button>
    <button id="backToMenuBtn">メニューに戻る</button>
  </div>
</div>
<p class="hint">マウス/指でパドルを操作。ホールドでボール発射・パドル移動<br>スピード5段階目でパドル接触時にホールドすると弾を吸着、そのままホールドで赤く強化。離すと貫通弾を発射<br>画像右上の小さな穴に強化弾を通すとジャックポット、3枚目の絵が現れます</p>

  function loadImageLayer(src){
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => {
        const c = document.createElement('canvas');
        c.width = AREA_W; c.height = AREA_H;
        const g = c.getContext('2d');
        g.drawImage(img, 0, 0, AREA_W, AREA_H);
        resolve(c);
      };
      img.onerror = reject;
      img.src = src;
    });
  }

  let topLayer, bottomLayer, jackpotLayer;

  // ジャックポットの穴: 画像最上部・右端、ボール一個分のサイズ
  const HOLE_W = 16;
  const HOLE_X = AREA_W - HOLE_W - 6;
  const HOLE_CENTER_X = HOLE_X + HOLE_W/2;
  const HOLE_MARK_Y = AREA_TOP + 2;
  let jackpotRevealed = false;
  let jackpotBannerUntil = 0;

  function triggerJackpot(){
    score += 100;
    jackpotRevealed = true;
    jackpotBannerUntil = performance.now() + 2200;
    if(!speedBoostApplied){
      SPEED_LEVELS.push(...JACKPOT_EXTRA_LEVELS); // 難易度アップ: 速度段階を2段階追加
      speedBoostApplied = true;
    }
    addCornerBlockers();
    updateHud();
  }

  // ---------- ブロック ----------
  const COLS = 14, ROWS = 11;
  const BRICK_W = AREA_W / COLS;
  const BRICK_H = AREA_H / ROWS;
  let bricks = [];

  function resetBricks(){
    bricks = [];
    for(let r=0;r<ROWS;r++){
      for(let c=0;c<COLS;c++){
        bricks.push({
          x: c*BRICK_W,
          y: AREA_TOP + r*BRICK_H,
          w: BRICK_W,
          h: BRICK_H,
          broken:false,
          indestructible:false
        });
      }
    }
  }

  // ジャックポット発生時、四隅から縦横4ブロック分ほど内側に破壊不可(反射のみ)のブロックを出現させて難易度を上げる
  function addCornerBlockers(){
    const OFFSET = 3;
    const r1 = OFFSET, r2 = ROWS - 1 - OFFSET;
    const c1 = OFFSET, c2 = COLS - 1 - OFFSET;
    const corners = [
      r1 * COLS + c1, // 左上寄り
      r1 * COLS + c2, // 右上寄り
      r2 * COLS + c1, // 左下寄り
      r2 * COLS + c2  // 右下寄り
    ];
    corners.forEach(i => {
      const b = bricks[i];
      if(!b) return;
      b.broken = false;
      b.indestructible = true;
    });
  }

  // ---------- パドル・ボール ----------
  const PADDLE_W = 84, PADDLE_H = 12;
  let paddleX = W/2 - PADDLE_W/2;
  const PADDLE_Y = H - 40;

  const SPEED_LEVELS = [4.6, 5.6, 6.6, 7.6, 8.6]; // 基本5段階(ジャックポット後は末尾に2段階追加)
  const JACKPOT_EXTRA_LEVELS = [9.6, 10.6]; // ジャックポットで追加される2段階
  let speedBoostApplied = false;
  function poweredSpeed(){
    return SPEED_LEVELS[SPEED_LEVELS.length - 1] + 1.0; // 強化版は常にその時点の最高速+1段階
  }
  const CHARGE_TIME = 550; // ms: ホールドし続けて真っ赤になるまでの時間
  const CATCH_WINDOW_MS = 60; // ms: パドル接触の瞬間、押した直後でないとキャッチできない猶予時間
  let ball, launched, lives, score, state;
  let isPointerDown = false;
  let pressStartTime = 0; // ホールドし続けているだけの自動キャッチを防ぐための押下開始時刻

  // ---------- 効果音(ブロック破壊音) ----------
  let audioCtx = null;
  function ensureAudio(){
    if(!audioCtx){
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if(Ctx) audioCtx = new Ctx();
    }
    if(audioCtx && audioCtx.state === 'suspended'){
      audioCtx.resume();
    }
  }
  function playBrickSound(){
    if(!audioCtx) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1500, t);
    osc.frequency.exponentialRampToValueAtTime(1000, t + 0.09);
    gain.gain.setValueAtTime(0.001, t);
    gain.gain.exponentialRampToValueAtTime(0.28, t + 0.008);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + 0.13);
  }

  // 吸着中の「ブワーン」というチャージ音(約2秒でエネルギーが満ちるイメージ)
  let chargeOsc = null;
  let chargeOsc2 = null;
  let chargeGain = null;
  function startChargeSound(){
    if(!audioCtx) return;
    stopChargeSound();
    const t = audioCtx.currentTime;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.exponentialRampToValueAtTime(0.016, t + 0.25);
    gain.gain.linearRampToValueAtTime(0.02, t + 1.1);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + 1.3);
    gain.connect(audioCtx.destination);

    const osc = audioCtx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(70, t);
    osc.frequency.exponentialRampToValueAtTime(240, t + 1.3);
    osc.connect(gain);
    osc.start(t);
    osc.stop(t + 1.35);

    const osc2 = audioCtx.createOscillator();
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(120, t);
    osc2.frequency.exponentialRampToValueAtTime(430, t + 1.3);
    const gain2 = audioCtx.createGain();
    gain2.gain.setValueAtTime(0.001, t);
    gain2.gain.linearRampToValueAtTime(0.007, t + 1.1);
    gain2.gain.exponentialRampToValueAtTime(0.0001, t + 1.3);
    osc2.connect(gain2);
    gain2.connect(audioCtx.destination);
    osc2.start(t);
    osc2.stop(t + 1.35);

    chargeOsc = osc;
    chargeOsc2 = osc2;
    chargeGain = gain;
  }
  function stopChargeSound(){
    if(!chargeOsc) return;
    const t = audioCtx.currentTime;
    try{
      chargeGain.gain.cancelScheduledValues(t);
      chargeGain.gain.setValueAtTime(Math.max(chargeGain.gain.value, 0.0001), t);
      chargeGain.gain.exponentialRampToValueAtTime(0.0001, t + 0.12);
    }catch(e){}
    try{ chargeOsc.stop(t + 0.14); }catch(e){}
    try{ chargeOsc2.stop(t + 0.14); }catch(e){}
    chargeOsc = null;
    chargeOsc2 = null;
    chargeGain = null;
  }

  function currentSpeed(){
    return SPEED_LEVELS[ball.speedLevel - 1];
  }

  function lerpColor(c1, c2, t){
    const a = parseInt(c1.slice(1),16), b = parseInt(c2.slice(1),16);
    const ar=(a>>16)&255, ag=(a>>8)&255, ab=a&255;
    const br=(b>>16)&255, bg=(b>>8)&255, bb=b&255;
    const r = Math.round(ar+(br-ar)*t), g = Math.round(ag+(bg-ag)*t), bl = Math.round(ab+(bb-ab)*t);
    return `rgb(${r},${g},${bl})`;
  }

  function ballColor(){
    if(ball.powered) return '#ff3b3b';
    if(ball.attached) return lerpColor('#f4efe4', '#ff3b3b', ball.charge);
    return '#f4efe4';
  }

  // 反射のたびに呼ぶ: レベルを1段上げて、現在の進行方向を保ったまま速度だけ底上げする
  function bumpSpeed(){
    if(ball.speedLevel < SPEED_LEVELS.length){
      ball.speedLevel++;
      updateHud();
    }
    const mag = Math.hypot(ball.vx, ball.vy) || 1;
    const factor = currentSpeed() / mag;
    ball.vx *= factor;
    ball.vy *= factor;
  }

  function resetBall(){
    stopChargeSound();
    ball = {
      x: paddleX + PADDLE_W/2,
      y: PADDLE_Y - 10,
      r: 7,
      vx: 0,
      vy: 0,
      speedLevel: 1,
      attached: false,
      powered: false,
      charge: 0,
      attachOffset: 0,
      holdStart: 0
    };
    launched = false;
  }

  function resetGame(){
    resetBricks();
    lives = 3;
    score = 0;
    state = 'playing';
    paddleX = W/2 - PADDLE_W/2;
    jackpotRevealed = false;
    jackpotBannerUntil = 0;
    SPEED_LEVELS.length = 5; // ジャックポットで追加された速度段階を除去し初期状態に戻す
    speedBoostApplied = false;
    resetBall();
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('galleryOverlay').style.display = 'none';
    updateHud();
  }

  function updateHud(){
    document.getElementById('score').textContent = score;
    document.getElementById('lives').textContent = lives;
    document.getElementById('speed').textContent = ball ? ball.speedLevel : 1;
  }

  // ---------- 入力 ----------
  function pointerX(e){
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    return (clientX - rect.left) * (W / rect.width);
  }

  canvas.addEventListener('mousemove', e=>{
    paddleX = Math.min(Math.max(pointerX(e) - PADDLE_W/2, 0), W - PADDLE_W);
  });
  canvas.addEventListener('touchmove', e=>{
    e.preventDefault();
    paddleX = Math.min(Math.max(pointerX(e) - PADDLE_W/2, 0), W - PADDLE_W);
  }, {passive:false});

  function launch(){
    if(state !== 'playing') return;
    if(!launched){
      launched = true;
      const angle = -Math.PI/2 + (Math.random()*0.6 - 0.3);
      ball.vx = Math.cos(angle) * currentSpeed();
      ball.vy = Math.sin(angle) * currentSpeed();
    }
  }

  function releaseBall(){
    if(!ball.attached) return;
    stopChargeSound();
    const angle = (ball.attachOffset / (PADDLE_W/2)) * (Math.PI/3);
    if(ball.charge >= 1){
      ball.powered = true;
      ball.vx = Math.sin(angle) * poweredSpeed();
      ball.vy = -Math.cos(angle) * poweredSpeed();
    } else {
      ball.powered = false;
      ball.vx = Math.sin(angle) * currentSpeed();
      ball.vy = -Math.cos(angle) * currentSpeed();
    }
    ball.attached = false;
    ball.charge = 0;
    ball.y = PADDLE_Y - ball.r;
  }

  function pointerDown(){
    ensureAudio();
    isPointerDown = true;
    pressStartTime = performance.now();
    if(!launched) launch();
  }
  function pointerUp(){
    isPointerDown = false;
    releaseBall();
  }

  canvas.addEventListener('mousedown', pointerDown);
  window.addEventListener('mouseup', pointerUp);
  canvas.addEventListener('touchstart', e=>{ e.preventDefault(); pointerDown(); }, {passive:false});
  window.addEventListener('touchend', pointerUp);
  window.addEventListener('touchcancel', pointerUp);

  document.getElementById('overlayBtn').addEventListener('click', resetGame);

  document.getElementById('viewArtBtn').addEventListener('click', () => {
    state = 'gallery';
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('galleryOverlay').style.display = 'flex';
  });
  document.getElementById('backToMenuBtn').addEventListener('click', () => {
    state = 'over';
    document.getElementById('galleryOverlay').style.display = 'none';
    document.getElementById('overlay').style.display = 'flex';
  });
  document.getElementById('saveArtBtn').addEventListener('click', () => {
    // 表示中の絵の元画像(高解像度)をそのままダウンロードする
    const src = jackpotRevealed ? JACKPOT_IMAGE_SRC : BOTTOM_IMAGE_SRC;
    const filename = (jackpotRevealed ? 'kenmo_kuzushi_3rd' : 'kenmo_kuzushi_2nd') + '.jpg';
    const link = document.createElement('a');
    link.href = src;
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  });

  // ---------- 更新処理 ----------
  function update(){
    if(state !== 'playing') return;

    if(!launched){
      ball.x = paddleX + PADDLE_W/2;
      ball.y = PADDLE_Y - 10;
      return;
    }

    if(ball.attached){
      const minX = paddleX + ball.r, maxX = paddleX + PADDLE_W - ball.r;
      ball.x = Math.min(Math.max(paddleX + PADDLE_W/2 + ball.attachOffset, minX), maxX);
      ball.y = PADDLE_Y - ball.r;
      ball.charge = Math.min((performance.now() - ball.holdStart) / CHARGE_TIME, 1);
      if(!isPointerDown){
        releaseBall();
      }
      return;
    }

    ball.x += ball.vx;
    ball.y += ball.vy;

    if(ball.x - ball.r < 0){ ball.x = ball.r; ball.vx *= -1; if(!ball.powered) bumpSpeed(); }
    if(ball.x + ball.r > W){ ball.x = W - ball.r; ball.vx *= -1; if(!ball.powered) bumpSpeed(); }
    if(ball.y - ball.r < AREA_TOP - 30){
      const inHole = ball.powered && ball.x > HOLE_X - ball.r && ball.x < HOLE_X + HOLE_W + ball.r;
      if(inHole){
        triggerJackpot();
        resetBall();
        return;
      }
      ball.y = AREA_TOP - 30 + ball.r; ball.vy *= -1; if(!ball.powered) bumpSpeed();
    }

    // パドル衝突
    if(ball.y + ball.r > PADDLE_Y && ball.y + ball.r < PADDLE_Y + PADDLE_H + 10 &&
       ball.x > paddleX && ball.x < paddleX + PADDLE_W && ball.vy > 0){
      const justPressed = isPointerDown && (performance.now() - pressStartTime) <= CATCH_WINDOW_MS;
      if(ball.speedLevel === SPEED_LEVELS.length && justPressed){
        // 最高速時(強化弾が戻ってきた場合も含む)、パドル接触の瞬間にジャストでクリック/タップしたらキャッチ(吸着)
        ball.attached = true;
        ball.powered = false;
        ball.charge = 0;
        ball.holdStart = performance.now();
        const clampedX = Math.min(Math.max(ball.x, paddleX), paddleX + PADDLE_W);
        ball.attachOffset = clampedX - (paddleX + PADDLE_W/2);
        ball.vx = 0; ball.vy = 0;
        ball.y = PADDLE_Y - ball.r;
        startChargeSound();
      } else {
        ball.powered = false;
        const hit = (ball.x - (paddleX + PADDLE_W/2)) / (PADDLE_W/2);
        const angle = hit * (Math.PI/3);
        if(ball.speedLevel < SPEED_LEVELS.length){ ball.speedLevel++; updateHud(); }
        ball.vx = Math.sin(angle) * currentSpeed();
        ball.vy = -Math.cos(angle) * currentSpeed();
        ball.y = PADDLE_Y - ball.r;
      }
    }

    // ブロック衝突
    for(const b of bricks){
      if(b.broken) continue;
      if(ball.x + ball.r > b.x && ball.x - ball.r < b.x + b.w &&
         ball.y + ball.r > b.y && ball.y - ball.r < b.y + b.h){
        const overlapLeft = (ball.x + ball.r) - b.x;
        const overlapRight = (b.x + b.w) - (ball.x - ball.r);
        const overlapTop = (ball.y + ball.r) - b.y;
        const overlapBottom = (b.y + b.h) - (ball.y - ball.r);
        const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);

        if(b.indestructible){
          // 破壊不可ブロック: 強化弾でも壊れず、必ず反射する
          if(minOverlap === overlapLeft){
            ball.vx = -Math.abs(ball.vx);
            ball.x = b.x - ball.r;
          } else if(minOverlap === overlapRight){
            ball.vx = Math.abs(ball.vx);
            ball.x = b.x + b.w + ball.r;
          } else if(minOverlap === overlapTop){
            ball.vy = -Math.abs(ball.vy);
            ball.y = b.y - ball.r;
          } else {
            ball.vy = Math.abs(ball.vy);
            ball.y = b.y + b.h + ball.r;
          }
          bumpSpeed();
          break;
        }

        b.broken = true;
        score += 10;
        updateHud();
        playBrickSound();
        if(ball.powered){
          // 強化版の弾は反射せずそのまま貫通する
          continue;
        }
        if(minOverlap === overlapLeft){
          ball.vx = -Math.abs(ball.vx);
          ball.x = b.x - ball.r;
        } else if(minOverlap === overlapRight){
          ball.vx = Math.abs(ball.vx);
          ball.x = b.x + b.w + ball.r;
        } else if(minOverlap === overlapTop){
          ball.vy = -Math.abs(ball.vy);
          ball.y = b.y - ball.r;
        } else {
          ball.vy = Math.abs(ball.vy);
          ball.y = b.y + b.h + ball.r;
        }
        bumpSpeed();
        break;
      }
    }

    // 落下
    if(ball.y - ball.r > H){
      lives--;
      updateHud();
      if(lives <= 0){
        endGame(false);
      } else {
        resetBall();
      }
    }

    // クリア判定(破壊不可ブロックは無視し、破壊可能なブロックが全て壊れていればクリア)
    if(bricks.every(b => b.indestructible || b.broken)){
      endGame(true);
    }
  }

  function endGame(win){
    state = 'over';
    const overlay = document.getElementById('overlay');
    document.getElementById('overlayTitle').textContent = win ? '完成！' : 'ゲームオーバー';
    const jackpotNote = jackpotRevealed ? '(3枚目の絵も発見済み)' : '(隠された穴を見つけると3枚目の絵が現れます)';
    document.getElementById('overlayText').textContent = (win
      ? '夕焼けの絵が完全に現れました。スコア: ' + score
      : 'ライフがなくなりました。スコア: ' + score) + ' ' + jackpotNote;
    document.getElementById('viewArtBtn').style.display = win ? 'inline-block' : 'none';
    overlay.style.display = 'flex';
  }

  // ---------- 描画 ----------
  function draw(){
    ctx.clearRect(0,0,W,H);

    if(state === 'gallery'){
      // 鑑賞モード: 縦横比を保ったまま中央に大きく表示し、背景を明るくする
      const finalImage = jackpotRevealed ? jackpotLayer : bottomLayer;
      ctx.fillStyle = '#f4efe4';
      ctx.fillRect(0,0,W,H);
      const yOffset = (H - AREA_H) / 2;
      ctx.drawImage(finalImage, 0,0,AREA_W,AREA_H, 0,yOffset,AREA_W,AREA_H);
      return;
    }

    // 上部バー
    ctx.fillStyle = '#0c0b12';
    ctx.fillRect(0,0,W,AREA_TOP);

    // 下の絵(常に全体表示。ジャックポット発見後は3枚目の絵に切り替わる)
    ctx.drawImage(jackpotRevealed ? jackpotLayer : bottomLayer, 0,0,AREA_W,AREA_H, 0,AREA_TOP,AREA_W,AREA_H);

    // 上の絵(壊れていないブロック部分だけ重ねる)
    for(const b of bricks){
      if(b.broken) continue;
      const sx = b.x, sy = b.y - AREA_TOP;
      ctx.drawImage(topLayer, sx, sy, b.w, b.h, b.x, b.y, b.w, b.h);
      if(b.indestructible){
        // 破壊不可ブロック: 金属っぽい網掛けで警告表示
        ctx.save();
        ctx.beginPath();
        ctx.rect(b.x, b.y, b.w, b.h);
        ctx.clip();
        ctx.fillStyle = 'rgba(40,40,50,0.55)';
        ctx.fillRect(b.x, b.y, b.w, b.h);
        ctx.strokeStyle = 'rgba(255,200,60,0.75)';
        ctx.lineWidth = 1.5;
        for(let d = -b.h; d < b.w; d += 5){
          ctx.beginPath();
          ctx.moveTo(b.x + d, b.y);
          ctx.lineTo(b.x + d + b.h, b.y + b.h);
          ctx.stroke();
        }
        ctx.restore();
        ctx.strokeStyle = 'rgba(255,200,60,0.9)';
        ctx.lineWidth = 2;
        ctx.strokeRect(b.x+1, b.y+1, b.w-2, b.h-2);
      }
      ctx.strokeStyle = 'rgba(0,0,0,0.15)';
      ctx.strokeRect(b.x, b.y, b.w, b.h);
    }

    // ジャックポットの穴マーカー(画像最上部・右端)
    ctx.save();
    const pulse = 0.5 + 0.5*Math.sin(performance.now()/220);
    ctx.beginPath();
    ctx.arc(HOLE_CENTER_X, HOLE_MARK_Y, HOLE_W/2 + 2, 0, Math.PI*2);
    ctx.fillStyle = '#000';
    ctx.fill();
    ctx.lineWidth = 2;
    ctx.strokeStyle = jackpotRevealed ? `rgba(217,178,90,${0.5+0.5*pulse})` : `rgba(255,255,255,${0.4+0.4*pulse})`;
    ctx.stroke();
    ctx.restore();

    // 下部プレイエリア背景
    ctx.fillStyle = '#0c0b12';
    ctx.fillRect(0, AREA_TOP+AREA_H, W, H-(AREA_TOP+AREA_H));

    // パドル
    const pgrad = ctx.createLinearGradient(paddleX,0,paddleX+PADDLE_W,0);
    pgrad.addColorStop(0,'#e8734a');
    pgrad.addColorStop(1,'#d9b25a');
    ctx.fillStyle = pgrad;
    ctx.beginPath();
    ctx.roundRect(paddleX, PADDLE_Y, PADDLE_W, PADDLE_H, 6);
    ctx.fill();

    // ボール
    ctx.save();
    if(ball.powered || (ball.attached && ball.charge > 0.4)){
      ctx.shadowColor = '#ff3b3b';
      ctx.shadowBlur = 14;
    }
    ctx.beginPath();
    ctx.fillStyle = ballColor();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    if(ball.attached){
      ctx.fillStyle = 'rgba(244,239,228,0.7)';
      ctx.font = '13px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(ball.charge >= 1 ? 'はなすと強化版発射！' : 'ホールドでチャージ中…', W/2, PADDLE_Y - 24);
    } else if(!launched && state === 'playing'){
      ctx.fillStyle = 'rgba(244,239,228,0.7)';
      ctx.font = '13px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('クリック / タップで発射', W/2, PADDLE_Y - 24);
    }

    // ジャックポット演出バナー
    if(performance.now() < jackpotBannerUntil){
      ctx.save();
      ctx.fillStyle = 'rgba(12,11,18,0.55)';
      ctx.fillRect(0, AREA_TOP + AREA_H/2 - 36, W, 72);
      ctx.fillStyle = '#d9b25a';
      ctx.font = 'bold 26px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('秘密の穴！', W/2, AREA_TOP + AREA_H/2 - 4);
      ctx.fillStyle = '#f4efe4';
      ctx.font = '13px sans-serif';
      ctx.fillText('3枚目の絵が現れました +100', W/2, AREA_TOP + AREA_H/2 + 20);
      ctx.restore();
    }
  }

  function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
  }

  ctx.fillStyle = '#0c0b12';
  ctx.fillRect(0,0,W,H);
  ctx.fillStyle = 'rgba(244,239,228,0.7)';
  ctx.font = '14px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('画像を読み込み中…', W/2, H/2);

  Promise.all([
    loadImageLayer(TOP_IMAGE_SRC),
    loadImageLayer(BOTTOM_IMAGE_SRC),
    loadImageLayer(JACKPOT_IMAGE_SRC)
  ]).then(([t, b, j]) => {
    topLayer = t;
    bottomLayer = b;
    jackpotLayer = j;
    resetGame();
    loop();
  }).catch(err => {
    console.error('画像の読み込みに失敗しました', err);
  });
})();
</script>
</body>
